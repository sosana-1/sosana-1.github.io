      <section class="add">
        <h2 class="section-title">Add Course</h2>
        <form>
          <label>Course Name:</label>
          <input type="text" placeholder="Enter course name" /><br /><br />

          <label>Instructor:</label>
          <input type="text" placeholder="Enter your Instructor" /><br /><br />

          <label>Credit Hours:</label>
          <input
            type="number"
            placeholder="number of Credit Hours"
          /><br /><br />

          <label>Notes:</label><br />
          <textarea rows="5" cols="30"></textarea><br /><br />

          <button type="submit">Add</button>
        </form>
      </section>
    </div>
  </body>
